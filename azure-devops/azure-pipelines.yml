trigger:
- main

pr:
- main

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

pool:
  vmImage: ubuntu-latest

variables:
- name: terraformVersion
  value: "1.8.5"
- name: serviceConnection
  value: "sc-cus-advocate-azure"

stages:

- stage: Terraform_Validate_Plan_Dev
  displayName: Terraform Validate and Plan DEV
  dependsOn: []
  condition: eq('${{ parameters.targetEnv }}', 'dev')
  variables:
  - group: vg-cus-advocate-dev
  - name: backend_resource_group
    value: rg-dev-enterprise-001
  - name: backend_storage_account
    value: stadvodevcusinfra
  - name: backend_state_resource_group
    value: rg-dev-enterprise-001
  - name: backend_state_storage_account
    value: stadvodevcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: dev/Advocate-Construction-Infra.tfstate

  jobs:
  - job: Terraform_DEV_Plan
    steps:
    - template: templates/install-terraform.yml

    - task: AzureCLI@2
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: '$(Build.SourcesDirectory)'
        inlineScript: |
          set -euo pipefail
          DEV_TFVARS="$(Build.SourcesDirectory)/environments/dev/dev.tfvars"
          AUTO_TFVARS="$(Build.SourcesDirectory)/pipeline.auto.tfvars"

          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=$(backend_state_resource_group)" \
            -backend-config="storage_account_name=$(backend_state_storage_account)" \
            -backend-config="container_name=$(backend_container)" \
            -backend-config="key=$(backend_key)"

          # Import existing resource group into state when created outside Terraform.
          DEV_RG_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/$(backend_resource_group)"
          if az group show --name "$(backend_resource_group)" >/dev/null 2>&1; then
            if ! terraform state list | grep -q '^azurerm_resource_group.main$'; then
              terraform import -input=false azurerm_resource_group.main "$DEV_RG_ID"
            fi
          fi

          cp "$DEV_TFVARS" "$AUTO_TFVARS"
          terraform validate
          terraform plan -input=false -var-file="$DEV_TFVARS" -out=tfplan
          rm -f "$AUTO_TFVARS"

    - publish: '$(Build.SourcesDirectory)/tfplan'
      artifact: tfplan-dev

- stage: Terraform_Apply_Dev
  displayName: Terraform Apply DEV
  dependsOn: Terraform_Validate_Plan_Dev
  condition: and(succeeded(), eq('${{ parameters.targetEnv }}', 'dev'))
  variables:
  - group: vg-cus-advocate-dev
  - name: backend_resource_group
    value: rg-dev-enterprise-001
  - name: backend_storage_account
    value: stadvodevcusinfra
  - name: backend_state_resource_group
    value: rg-dev-enterprise-001
  - name: backend_state_storage_account
    value: stadvodevcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: dev/Advocate-Construction-Infra.tfstate

  jobs:
  - job: Terraform_DEV_Apply
    steps:
    - template: templates/install-terraform.yml

    - download: current
      artifact: tfplan-dev

    - task: AzureCLI@2
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: '$(Build.SourcesDirectory)'
        inlineScript: |
          set -euo pipefail
          PROD_TFVARS="$(Build.SourcesDirectory)/environments/prod/prod.tfvars"
          AUTO_TFVARS="$(Build.SourcesDirectory)/pipeline.auto.tfvars"

          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=$(backend_state_resource_group)" \
            -backend-config="storage_account_name=$(backend_state_storage_account)" \
            -backend-config="container_name=$(backend_container)" \
            -backend-config="key=$(backend_key)"
          terraform apply -input=false -auto-approve "$(Pipeline.Workspace)/tfplan-dev/tfplan"

- stage: Terraform_Validate_Plan_Prod
  displayName: Terraform Validate and Plan PROD
  dependsOn: []
  condition: eq('${{ parameters.targetEnv }}', 'prod')
  variables:
  - group: vg-cus-advocate-prod
  - name: backend_resource_group
    value: rg-prod-enterprise-001
  - name: backend_storage_account
    value: stadvoprdcusinfra
  - name: backend_state_resource_group
    value: rg-dev-enterprise-001
  - name: backend_state_storage_account
    value: stadvodevcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: prod/Advocate-Construction-Infra.tfstate
  - name: prod_app_service_plan_name
    value: asp-prod-enterprise-001
  - name: prod_webapp_name
    value: webapp-adv-prd-cus-infra

  jobs:
  - job: Terraform_PROD_Plan
    steps:
    - template: templates/install-terraform.yml

    - task: AzureCLI@2
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: '$(Build.SourcesDirectory)'
        inlineScript: |
          set -euo pipefail
          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=$(backend_state_resource_group)" \
            -backend-config="storage_account_name=$(backend_state_storage_account)" \
            -backend-config="container_name=$(backend_container)" \
            -backend-config="key=$(backend_key)"

          # Import existing PROD resources into state when created outside Terraform.
          PROD_RG_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/$(backend_resource_group)"
          ASP_ID="${PROD_RG_ID}/providers/Microsoft.Web/serverfarms/$(prod_app_service_plan_name)"
          WEBAPP_ID="${PROD_RG_ID}/providers/Microsoft.Web/sites/$(prod_webapp_name)"

          if az group show --name "$(backend_resource_group)" >/dev/null 2>&1; then
            if ! terraform state list | grep -q '^azurerm_resource_group.main$'; then
              terraform import -input=false azurerm_resource_group.main "$PROD_RG_ID"
            fi
          fi

          if az resource show --ids "$ASP_ID" >/dev/null 2>&1; then
            if ! terraform state list | grep -q '^module.app_service_plan.azurerm_service_plan.asp$'; then
              terraform import -input=false module.app_service_plan.azurerm_service_plan.asp "$ASP_ID"
            fi
          fi

          if az resource show --ids "$WEBAPP_ID" >/dev/null 2>&1; then
            if ! terraform state list | grep -q '^module.webapp.azurerm_linux_web_app.webapp$'; then
              terraform import -input=false module.webapp.azurerm_linux_web_app.webapp "$WEBAPP_ID"
            fi
          fi

          cp "$PROD_TFVARS" "$AUTO_TFVARS"
          terraform validate
          terraform plan -input=false -var-file="$PROD_TFVARS" -out=tfplan
          rm -f "$AUTO_TFVARS"

    - publish: '$(Build.SourcesDirectory)/tfplan'
      artifact: tfplan-prod

- stage: Terraform_Apply_Prod
  displayName: Terraform Apply PROD
  dependsOn: Terraform_Validate_Plan_Prod
  condition: and(succeeded(), eq('${{ parameters.targetEnv }}', 'prod'))

  variables:
  - group: vg-cus-advocate-prod
  - name: backend_resource_group
    value: rg-prod-enterprise-001
  - name: backend_storage_account
    value: stadvoprdcusinfra
  - name: backend_state_resource_group
    value: rg-dev-enterprise-001
  - name: backend_state_storage_account
    value: stadvodevcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: prod/Advocate-Construction-Infra.tfstate

  jobs:
  - deployment: Terraform_PROD_Apply
    environment: PROD
    strategy:
      runOnce:
        deploy:
          steps:
          - template: templates/install-terraform.yml

          - download: current
            artifact: tfplan-prod

          - task: AzureCLI@2
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: '$(Build.SourcesDirectory)'
              inlineScript: |
                set -euo pipefail
                terraform init -input=false -reconfigure \
                  -backend-config="resource_group_name=$(backend_state_resource_group)" \
                  -backend-config="storage_account_name=$(backend_state_storage_account)" \
                  -backend-config="container_name=$(backend_container)" \
                  -backend-config="key=$(backend_key)"
                terraform apply -input=false -auto-approve "$(Pipeline.Workspace)/tfplan-prod/tfplan"