trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: vg-cus-advocate-dev

stages:
- stage: Terraform_Validate_Plan_Dev
  displayName: Terraform Validate and Plan DEV
  variables:
  - name: backend_resource_group
    value: rg-dev-enterprise-001
  - name: backend_storage_account
    value: stadvodevcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: dev/Advocate-Construction-Infra.tfstate

  jobs:
  - job: Terraform_DEV_Plan

    steps:
    - script: |
        TERRAFORM_VERSION="1.8.5"

        sudo apt-get update
        sudo apt-get install -y unzip wget

        wget https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip

        unzip terraform_${TERRAFORM_VERSION}_linux_amd64.zip

        sudo mv terraform /usr/local/bin/

        terraform -version
      displayName: Install Terraform

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'sc-cus-advocate-azure'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=$(backend_resource_group)" \
            -backend-config="storage_account_name=$(backend_storage_account)" \
            -backend-config="container_name=$(backend_container)" \
            -backend-config="key=$(backend_key)"
          terraform validate
          terraform plan -var-file=environments/dev/dev.tfvars -out=tfplan-dev


- stage: Terraform_Apply_Dev
  displayName: Terraform Apply DEV
  dependsOn: Terraform_Validate_Plan_Dev
  variables:
  - name: backend_resource_group
    value: rg-dev-enterprise-001
  - name: backend_storage_account
    value: stadvodevcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: dev/Advocate-Construction-Infra.tfstate

  jobs:
  - job: Terraform_DEV_Apply

    steps:
    - script: |
        TERRAFORM_VERSION="1.8.5"

        sudo apt-get update
        sudo apt-get install -y unzip wget

        wget https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip

        unzip terraform_${TERRAFORM_VERSION}_linux_amd64.zip

        sudo mv terraform /usr/local/bin/

        terraform -version
      displayName: Install Terraform

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'sc-cus-advocate-azure'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=$(backend_resource_group)" \
            -backend-config="storage_account_name=$(backend_storage_account)" \
            -backend-config="container_name=$(backend_container)" \
            -backend-config="key=$(backend_key)"
          terraform apply -auto-approve -var-file=environments/dev/dev.tfvars


- stage: Terraform_Validate_Plan_Prod
  displayName: Terraform Validate and Plan PROD
  dependsOn: Terraform_Apply_Dev

  variables:
  - group: vg-cus-advocate-prod
  - name: backend_resource_group
    value: rg-prod-enterprise-001
  - name: backend_storage_account
    value: stadvoprdcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: prod/Advocate-Construction-Infra.tfstate

  jobs:
  - job: Terraform_PROD_Plan

    steps:
    - script: |
        TERRAFORM_VERSION="1.8.5"

        sudo apt-get update
        sudo apt-get install -y unzip wget

        wget https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip

        unzip terraform_${TERRAFORM_VERSION}_linux_amd64.zip

        sudo mv terraform /usr/local/bin/

        terraform -version
      displayName: Install Terraform

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'sc-cus-advocate-azure'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=$(backend_resource_group)" \
            -backend-config="storage_account_name=$(backend_storage_account)" \
            -backend-config="container_name=$(backend_container)" \
            -backend-config="key=$(backend_key)"
          terraform validate
          terraform plan -var-file=environments/prod/prod.tfvars -out=tfplan-prod


- stage: Terraform_Apply_Prod
  displayName: Terraform Apply PROD
  dependsOn: Terraform_Validate_Plan_Prod

  variables:
  - group: vg-cus-advocate-prod
  - name: backend_resource_group
    value: rg-prod-enterprise-001
  - name: backend_storage_account
    value: stadvoprdcusinfra
  - name: backend_container
    value: tfstate
  - name: backend_key
    value: prod/Advocate-Construction-Infra.tfstate

  jobs:
  - deployment: Terraform_PROD_Apply
    environment: PROD

    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              TERRAFORM_VERSION="1.8.5"

              sudo apt-get update
              sudo apt-get install -y unzip wget

              wget https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip

              unzip terraform_${TERRAFORM_VERSION}_linux_amd64.zip

              sudo mv terraform /usr/local/bin/

              terraform -version
            displayName: Install Terraform

          - task: AzureCLI@2
            inputs:
              azureSubscription: 'sc-cus-advocate-azure'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                terraform init -reconfigure \
                  -backend-config="resource_group_name=$(backend_resource_group)" \
                  -backend-config="storage_account_name=$(backend_storage_account)" \
                  -backend-config="container_name=$(backend_container)" \
                  -backend-config="key=$(backend_key)"
                terraform apply -auto-approve -var-file=environments/prod/prod.tfvars