trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: vg-cus-advocate-dev

stages:

- stage: Terraform_Validate_Plan_Dev
  displayName: Terraform Validate and Plan DEV
  jobs:
  - job: Terraform_DEV_Plan
    steps:
    - script: |
        sudo apt-get update
        sudo apt-get install -y gnupg software-properties-common curl
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update
        sudo apt-get install -y terraform
        terraform -version
      displayName: Install Terraform

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'sc-cus-advocate-azure'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init
          terraform validate
          terraform plan -var-file=environments/dev/dev.tfvars

- stage: Terraform_Apply_Dev
  displayName: Terraform Apply DEV
  dependsOn: Terraform_Validate_Plan_Dev
  jobs:
  - job: Terraform_DEV_Apply
    steps:
    - script: |
        sudo apt-get update
        sudo apt-get install -y gnupg software-properties-common curl
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update
        sudo apt-get install -y terraform
        terraform -version
      displayName: Install Terraform

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'sc-cus-advocate-azure'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init
          terraform apply -auto-approve -var-file=environments/dev/dev.tfvars

- stage: Terraform_Validate_Plan_Prod
  displayName: Terraform Validate and Plan PROD
  dependsOn: Terraform_Apply_Dev
  variables:
  - group: vg-cus-advocate-prod
  jobs:
  - job: Terraform_PROD_Plan
    steps:
    - script: |
        sudo apt-get update
        sudo apt-get install -y gnupg software-properties-common curl
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update
        sudo apt-get install -y terraform
        terraform -version
      displayName: Install Terraform

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'sc-cus-advocate-azure'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init
          terraform validate
          terraform plan -var-file=environments/prod/prod.tfvars

- stage: Terraform_Apply_Prod
  displayName: Terraform Apply PROD
  dependsOn: Terraform_Validate_Plan_Prod
  variables:
  - group: vg-cus-advocate-prod
  jobs:
  - deployment: Terraform_PROD_Apply
    environment: PROD
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              sudo apt-get update
              sudo apt-get install -y gnupg software-properties-common curl
              curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
              echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              sudo apt-get update
              sudo apt-get install -y terraform
              terraform -version
            displayName: Install Terraform

          - task: AzureCLI@2
            inputs:
              azureSubscription: 'sc-cus-advocate-azure'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                terraform init
                terraform apply -auto-approve -var-file=environments/prod/prod.tfvars